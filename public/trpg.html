<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DND 跑团 · 幻境密室</title>
<link rel="stylesheet" href="/css/global.css">
<script src="/socket.io/socket.io.js"></script>
<script src="/js/socket-client.js"></script>
<style>
:root{--gold:#f5c518;--dk:#1a1a2e;--card:#16213e;--border:#2a3a5e;--text:#e0e6f0;--accent:#7c6af0;--dm-bg:#0d1a0d;--dm-border:#1e5e1e;--dm-text:#90ee90;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--dk);color:var(--text);font-family:'Microsoft YaHei',sans-serif}
/* 顶部工具栏 */
.top-bar{height:50px;background:linear-gradient(90deg,#0f1a35,#1a1a2e);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.campaign-title{font-size:1rem;font-weight:700;color:var(--gold);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chapter-badge{padding:3px 10px;background:#1e3a1e;border:1px solid #2e7e2e;border-radius:12px;font-size:.75rem;color:#7cd67c;white-space:nowrap}
.top-btn{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:.78rem;transition:.2s;white-space:nowrap}
.top-btn:hover{border-color:var(--accent);color:var(--accent)}
.top-btn.danger{border-color:#5a1a1a}
.top-btn.danger:hover{border-color:#ff6b6b;color:#ff6b6b}
/* 主布局 */
.layout{display:flex;height:calc(100vh - 50px)}
/* 左侧：剧情日志 */
.story-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
.story-log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
/* DM叙述 */
.dm-msg{background:var(--dm-bg);border:1px solid var(--dm-border);border-radius:8px;padding:12px 14px;line-height:1.7}
.dm-msg .dm-label{font-size:.75rem;color:#4aaa4a;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dm-msg .dm-content{color:var(--dm-text);font-size:.9rem;white-space:pre-wrap}
/* 玩家行动 */
.player-msg{background:var(--card);border-radius:8px;padding:10px 14px;border-left:3px solid var(--accent)}
.player-msg .player-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.player-msg .player-av{font-size:1.1rem}
.player-msg .player-name{font-size:.78rem;color:#aabb cc;font-weight:600}
.player-msg .player-action{color:var(--text);font-size:.88rem}
.player-msg .action-tag{font-size:.7rem;color:var(--accent);background:#1a1a3a;padding:1px 7px;border-radius:10px}
/* 骰子结果 */
.dice-msg{background:#1a1530;border:1px solid #3a2a6e;border-radius:8px;padding:10px 14px}
.dice-msg .dice-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dice-msg .dice-label{font-size:.75rem;color:#9988ee}
.dice-total{font-size:1.4rem;font-weight:bold;color:var(--gold)}
.dice-detail{font-size:.78rem;color:#8877cc}
.dice-special{font-size:.85rem;font-weight:bold;padding:2px 8px;border-radius:10px}
.dice-special.crit{background:#1a3a1a;color:#7cd67c}
.dice-special.fumble{background:#3a1a1a;color:#ff6b6b}
/* 检定结果 */
.check-msg{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:8px;padding:10px 14px}
.check-success{border-color:#1e6e1e!important;background:#0d1a0d!important}
.check-fail{border-color:#6e1e1e!important;background:#1a0d0d!important}
/* 系统提示 */
.sys-msg{text-align:center;font-size:.78rem;color:#556677;padding:4px}
/* DM打字动画 */
.dm-typing{display:none;padding:10px 14px;color:#4aaa4a;font-size:.85rem;animation:pulse 1.2s infinite}
.dm-typing.show{display:block}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
/* 升级通知 */
.level-up-toast{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2a1a5a,#1a3a1a);border:2px solid var(--gold);border-radius:12px;padding:14px 24px;text-align:center;z-index:1000;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
/* 底部输入区 */
.input-area{border-top:1px solid var(--border);padding:12px 16px;background:#0f1428}
.action-row{display:flex;gap:8px;margin-bottom:8px}
.action-input{flex:1;background:#0a1020;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem;font-family:inherit;transition:.2s}
.action-input:focus{outline:none;border-color:var(--accent)}
.send-btn{padding:10px 20px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.send-btn:hover{background:#6a5ae0}
.quick-row{display:flex;gap:6px;flex-wrap:wrap}
.quick-btn{padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:16px;font-size:.75rem;cursor:pointer;transition:.2s;color:#aabbcc}
.quick-btn:hover{border-color:var(--accent);color:var(--accent)}
.dice-quick{color:#9988ee;border-color:#3a2a6e}
.dice-quick:hover{background:#1a1530;border-color:#9988ee;color:#ddbbff}
/* 右侧：角色面板 */
.right-panel{width:300px;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;background:#0f1428}
.right-section{border-bottom:1px solid var(--border);padding:12px}
.right-section h4{font-size:.8rem;color:#8899bb;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
/* 我的角色卡 */
.my-char-card{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border)}
.char-name{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:2px}
.char-sub{font-size:.75rem;color:#8899bb;margin-bottom:8px}
.hp-bar-wrap{margin-bottom:8px}
.hp-label{display:flex;justify-content:space-between;font-size:.75rem;color:#8899bb;margin-bottom:3px}
.hp-bar{height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.hp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2ecc71,#27ae60);transition:.3s}
.hp-fill.warn{background:linear-gradient(90deg,#f39c12,#e67e22)}
.hp-fill.danger{background:linear-gradient(90deg,#e74c3c,#c0392b);animation:hpDanger .8s infinite}
@keyframes hpDanger{0%,100%{opacity:1}50%{opacity:.6}}
.char-stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
.mini-stat{background:#0f1a2e;border-radius:4px;padding:5px;text-align:center}
.mini-stat .n{font-size:.6rem;color:#8899bb}
.mini-stat .v{font-size:.95rem;font-weight:bold;color:var(--text)}
.char-hp-btns{display:flex;gap:4px;margin-top:8px}
.hp-btn{flex:1;padding:5px;background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-size:.75rem;text-align:center}
.hp-btn.heal{border-color:#1e6e1e;color:#7cd67c}
.hp-btn.damage{border-color:#6e1e1e;color:#ff6b6b}
.hp-input{width:60px;background:#0a1020;border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--text);font-size:.8rem;text-align:center}
/* 队友列表 */
.party-list{display:flex;flex-direction:column;gap:6px}
.party-member{background:var(--card);border-radius:6px;padding:8px;border:1px solid var(--border)}
.party-member .pm-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.party-member .pm-av{font-size:1rem}
.party-member .pm-name{font-size:.8rem;font-weight:600;flex:1}
.party-member .pm-class{font-size:.7rem;color:#8899bb}
.party-member .pm-hp{font-size:.75rem;color:#7cd67c}
/* 战役信息 */
.campaign-info p{font-size:.8rem;color:#8899bb;margin-bottom:6px;line-height:1.5}
.campaign-info strong{color:var(--text)}
/* 物品栏 */
.loot-list{font-size:.8rem;color:#8899bb;line-height:1.7}
.loot-list li{list-style:none;padding:2px 0;border-bottom:1px solid #1a2a3e}
.loot-list li::before{content:'• ';color:var(--gold)}
/* NPC生成器 */
.npc-gen{margin-top:6px}
.npc-gen input{width:100%;background:#0a1020;border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:var(--text);font-size:.78rem;margin-bottom:5px}
.npc-gen button{width:100%;padding:6px;background:#1a2a3a;border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-size:.78rem}
.npc-gen button:hover{border-color:var(--accent)}
.npc-result{font-size:.78rem;color:#8899bb;margin-top:6px;line-height:1.5;white-space:pre-wrap;max-height:120px;overflow-y:auto}
/* 场景编辑（仅DM） */
.scene-edit{display:none}
.scene-edit.visible{display:block}
.scene-edit textarea{width:100%;background:#0a1020;border:1px solid var(--border);border-radius:5px;padding:7px;color:var(--text);font-size:.78rem;resize:vertical;min-height:60px;font-family:inherit}
.scene-edit button{margin-top:4px;padding:5px 12px;background:#1a2a4a;border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-size:.78rem}
/* 等待开始 */
.waiting-overlay{position:fixed;inset:0;background:rgba(10,16,32,.95);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:20px}
.waiting-overlay h2{font-size:1.5rem;color:var(--gold)}
.waiting-overlay p{color:#8899bb;font-size:.9rem;text-align:center;max-width:400px;line-height:1.6}
.waiting-overlay .scenario-select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;max-width:500px;width:100%}
.scenario-card{padding:10px;background:#0f1a2e;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px;transition:.2s}
.scenario-card:hover,.scenario-card.sel{border-color:var(--gold);background:#1a1a30}
.scenario-card h3{font-size:.9rem;color:var(--gold);margin-bottom:3px}
.scenario-card p{font-size:.75rem;color:#8899bb}
.big-btn{padding:12px 28px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:.2s}
.big-btn:hover{background:#6a5ae0}
.big-btn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>

<!-- 等待开始（房主选场景/普通玩家等待） -->
<div class="waiting-overlay" id="waitingOverlay">
  <h2>⚔️ DND AI 跑团</h2>
  <p id="waitingDesc">正在连接服务器，请稍候…</p>
  <div id="ownerControls" style="display:none;width:100%;max-width:520px">
    <div class="scenario-select">
      <div style="font-size:.9rem;color:#8899bb;margin-bottom:12px">📖 选择剧情模板（房主）</div>
      <div id="scenarioList"></div>
      <button class="big-btn" id="startCampaignBtn" disabled onclick="startCampaign()" style="margin-top:10px;width:100%">🎲 开始战役！</button>
    </div>
  </div>
  <div id="playerWaiting" style="display:none;text-align:center">
    <div style="font-size:2rem;margin-bottom:10px">⏳</div>
    <p>等待房主开始战役…<br><small style="color:#556677">你的角色已就绪，稍作休息片刻</small></p>
    <div id="partyReadyList" style="margin-top:12px"></div>
  </div>
</div>

<!-- 主界面 -->
<div class="top-bar">
  <span class="campaign-title" id="topTitle">DND AI 跑团</span>
  <span class="chapter-badge" id="chapterBadge">第1章</span>
  <button class="top-btn" onclick="saveGame()" title="保存战役进度">💾 保存</button>
  <button class="top-btn" onclick="exportGame()" title="导出为文本">📄 导出</button>
  <button class="top-btn" id="startBtn" onclick="startPlay()" style="display:none;background:var(--accent);border-color:var(--accent)">▶ 开始冒险</button>
  <button class="top-btn danger" onclick="leaveGame()">离开</button>
</div>

<div class="layout">
  <!-- 左侧：剧情日志 + 输入 -->
  <div class="story-panel">
    <div class="story-log" id="storyLog">
      <div class="sys-msg">⚔️ 欢迎来到幻境密室 DND AI 跑团 — 你们的冒险即将开始</div>
    </div>
    <div class="dm-typing" id="dmTyping">🎲 DM 正在叙述中…</div>
    <div class="input-area">
      <div class="action-row">
        <input class="action-input" id="actionInput" placeholder="描述你的行动，例如：我向前靠近，仔细观察这扇门..." maxlength="500">
        <button class="send-btn" onclick="sendAction()">行动 ↵</button>
      </div>
      <div class="quick-row">
        <button class="quick-btn" onclick="insertAction('我仔细观察周围环境')">👁 观察</button>
        <button class="quick-btn" onclick="insertAction('我向NPC打招呼，询问情况')">💬 交谈</button>
        <button class="quick-btn" onclick="insertAction('我悄悄地靠近，尝试偷偷行事')">🥷 潜行</button>
        <button class="quick-btn" onclick="insertAction('我搜索附近，寻找线索或物品')">🔍 搜索</button>
        <button class="quick-btn" onclick="insertAction('我选择原地休息，恢复状态')">🛌 休息</button>
        <span style="margin-left:4px;color:#556677;font-size:.75rem">掷骰：</span>
        <button class="quick-btn dice-quick" onclick="rollDice('d20')">🎲 d20</button>
        <button class="quick-btn dice-quick" onclick="rollDice('2d6')">🎲 2d6</button>
        <button class="quick-btn dice-quick" onclick="rollDice('d20')">🎲 感知检定</button>
        <button class="quick-btn dice-quick" onclick="showSkillCheck()">⚔️ 技能检定</button>
      </div>
    </div>
  </div>

  <!-- 右侧：角色面板 -->
  <div class="right-panel">
    <!-- 我的角色 -->
    <div class="right-section">
      <h4>我的角色</h4>
      <div id="myCharCard"><div style="color:#556677;font-size:.8rem">创建角色后显示</div></div>
      <!-- HP 调整（自己用） -->
      <div style="display:flex;align-items:center;gap:6px;margin-top:8px" id="hpControls">
        <input type="number" class="hp-input" id="hpAmount" value="1" min="1" max="999">
        <button class="hp-btn heal" onclick="changeHP('heal')">+治疗</button>
        <button class="hp-btn damage" onclick="changeHP('damage')">-伤害</button>
      </div>
    </div>

    <!-- 队伍 -->
    <div class="right-section">
      <h4>队伍 <span id="partyCount" style="color:var(--gold)">0</span>人</h4>
      <div class="party-list" id="partyList"></div>
    </div>

    <!-- 战役信息 -->
    <div class="right-section">
      <h4>战役信息</h4>
      <div class="campaign-info" id="campaignInfo">
        <p><strong>加载中…</strong></p>
      </div>
      <!-- 仅DM显示的场景编辑 -->
      <div class="scene-edit" id="sceneEdit">
        <div style="font-size:.75rem;color:#8899bb;margin-top:8px;margin-bottom:4px">✏️ 修改场景描述（仅DM）</div>
        <textarea id="sceneInput" rows="3"></textarea>
        <button onclick="updateScene()">更新场景</button>
      </div>
    </div>

    <!-- 战利品 -->
    <div class="right-section">
      <h4>战利品 🏆</h4>
      <ul class="loot-list" id="lootList"><li style="color:#556677">无</li></ul>
    </div>

    <!-- NPC 生成器 -->
    <div class="right-section">
      <h4>NPC 即兴生成 🎭</h4>
      <div class="npc-gen">
        <input id="npcHint" placeholder="描述NPC，例如：一个神秘的老法师">
        <button onclick="generateNPC()">✨ AI 生成</button>
        <div class="npc-result" id="npcResult"></div>
      </div>
    </div>
  </div>
</div>

<!-- 升级通知 -->
<div class="level-up-toast" id="levelUpToast">
  <div style="font-size:1.8rem">🌟</div>
  <div id="levelUpText" style="font-size:1.1rem;color:var(--gold);font-weight:bold"></div>
  <div style="font-size:.85rem;color:#8899bb" id="levelUpSub"></div>
</div>

<script>
// ── 状态 ─────────────────────────────────────────────────
let campaign = null;
let myChar   = null;
let isOwner  = false;
let mySocketId = null;
let selectedScenario = null;

// ── 初始化 ───────────────────────────────────────────────
if (!Session.isValid() || !Session.roomId) { window.location.href = '/lobby.html'; }

const savedChar = sessionStorage.getItem('my_character');
if (savedChar) myChar = JSON.parse(savedChar);

const socket = SocketClient.connect();

socket.on('connect', () => {
  mySocketId = socket.id;
  SocketClient.emit('join_lobby', { nickname: Session.nickname, avatar: Session.avatar });
});

let joinedRoom = false;
socket.on('room_list_update', () => {
  if (!joinedRoom) {
    joinedRoom = true;
    SocketClient.emit('join_room', { roomId: Session.roomId });
  }
});

socket.on('room_joined', ({ room, mySocketId: sid }) => {
  mySocketId = sid || socket.id;
  isOwner = room.ownerId === mySocketId;
  SocketClient.emit('trpg_get_campaign');
  if (!campaign) showWaiting(room);
});

socket.on('room_state_update', ({ room }) => {
  isOwner = room.ownerId === mySocketId;
});

// 接收场景/职业数据
socket.on('trpg_data', (data) => {
  if (!campaign) renderScenarioSelect(data.scenarios);
});

// 战役创建
socket.on('trpg_campaign_created', ({ campaign: c }) => {
  campaign = c;
  renderCampaignInfo();
  if (c.status === 'playing') {
    hideWaiting();
    showOwnerStartBtn();
  } else if (isOwner) {
    document.getElementById('ownerControls').style.display = 'block';
    document.getElementById('playerWaiting').style.display = 'none';
    document.getElementById('waitingDesc').textContent = '选择一个剧情开始你们的冒险';
  }
  updatePartyList();
});

socket.on('trpg_campaign_updated', ({ campaign: c }) => {
  campaign = c;
  renderCampaignInfo();
  updatePartyList();
  updateMyChar();
});

// 战役开始
socket.on('trpg_started', ({ campaign: c }) => {
  campaign = c;
  hideWaiting();
  if (isOwner) document.getElementById('startBtn').style.display = 'block';
  renderCampaignInfo();
  addSysMsg('🎮 战役「' + c.title + '」已开始！');
});

// DM 消息
socket.on('trpg_dm_message', ({ content, time }) => {
  addDMMsg(content, time);
  document.getElementById('dmTyping').classList.remove('show');
  scrollToBottom();
});

socket.on('trpg_dm_typing', ({ typing }) => {
  document.getElementById('dmTyping').classList.toggle('show', typing);
  if (typing) scrollToBottom();
});

// 玩家行动
socket.on('trpg_player_action', ({ socketId, nickname, avatar, action, time }) => {
  const isSelf = socketId === mySocketId;
  addPlayerAction(isSelf ? '我' : nickname, avatar || '🧙', action, time, isSelf);
});

// 骰子结果
socket.on('trpg_dice_result', ({ socketId, nickname, avatar, notation, rolls, modifier, total, special, time }) => {
  addDiceResult(socketId === mySocketId ? '我' : nickname, notation, rolls, modifier, total, special, time);
});

// 技能检定结果
socket.on('trpg_check_result', ({ socketId, nickname, skill, roll, total, modifier, dc, success, isCritical, isFumble, time }) => {
  const name = socketId === mySocketId ? '我' : nickname;
  addCheckResult(name, skill, roll, total, modifier, dc, success, isCritical, isFumble, time);
});

// DM要求检定
socket.on('trpg_check_required', ({ skill, dc }) => {
  addSysMsg(`🎲 DM 要求 ${skill} 检定（DC ${dc}）！请点击"技能检定"按钮`);
  document.getElementById('actionInput').placeholder = `进行${skill}检定 DC${dc}（或点击下方技能检定按钮）`;
});

// 升级
socket.on('trpg_level_up', ({ characterName, newLevel, hpGain }) => {
  const toast = document.getElementById('levelUpToast');
  document.getElementById('levelUpText').textContent = `🎉 ${characterName} 升至 ${newLevel} 级！`;
  document.getElementById('levelUpSub').textContent = `HP +${hpGain}，能力增强！`;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 4000);
});

// 场景更新
socket.on('trpg_scene_updated', ({ scene, notes, chapter }) => {
  if (campaign) { campaign.currentScene = scene; campaign.sessionNotes = notes; campaign.chapter = chapter; }
  renderCampaignInfo();
  document.getElementById('chapterBadge').textContent = `第${chapter}章`;
  addSysMsg(`📍 场景已更新：${scene.substring(0,50)}…`);
});

// 存档确认
socket.on('trpg_saved', ({ success }) => {
  Toast.show(success ? '💾 战役已保存！' : '保存失败', success ? 'success' : 'error');
});

// 导出数据
socket.on('trpg_export_data', ({ text, title }) => {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${title}_冒险记录.txt`;
  a.click();
  URL.revokeObjectURL(url);
  Toast.show('📄 已导出冒险记录', 'success');
});

// NPC 生成
socket.on('trpg_npc_generated', ({ npc }) => {
  document.getElementById('npcResult').textContent = npc;
});

socket.on('error_msg', ({ message }) => {
  Toast.show(message, 'error');
});

socket.on('trpg_character_set', ({ character }) => {
  myChar = character;
  sessionStorage.setItem('my_character', JSON.stringify(character));
  updateMyChar();
  // 通知队伍
  if (campaign) { SocketClient.emit('trpg_get_campaign'); }
});

// ── 等待界面 ─────────────────────────────────────────────
function showWaiting(room) {
  isOwner = room.ownerId === mySocketId;
  document.getElementById('waitingOverlay').style.display = 'flex';
  if (isOwner) {
    document.getElementById('ownerControls').style.display = 'block';
    document.getElementById('playerWaiting').style.display = 'none';
    document.getElementById('waitingDesc').textContent = '选择剧情模板，开始你们的冒险';
    SocketClient.emit('trpg_get_data');
  } else {
    document.getElementById('ownerControls').style.display = 'none';
    document.getElementById('playerWaiting').style.display = 'block';
    document.getElementById('waitingDesc').textContent = `战役准备中…`;
    renderPartyReady(room);
  }
}

function hideWaiting() {
  document.getElementById('waitingOverlay').style.display = 'none';
}

function renderPartyReady(room) {
  const list = document.getElementById('partyReadyList');
  if (!room || !room.players) return;
  list.innerHTML = room.players.map(p => `<span style="margin:4px;padding:4px 10px;background:#1a2a3a;border-radius:10px;font-size:.8rem">${p.avatar||'🧙'} ${p.nickname}</span>`).join('');
}

function renderScenarioSelect(scenarios) {
  const list = document.getElementById('scenarioList');
  list.innerHTML = '';
  scenarios.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scenario-card';
    card.dataset.id = s.id;
    card.innerHTML = `<h3>${s.title} <span style="font-size:.7rem;color:#8899bb;margin-left:6px">${s.difficulty} · ${s.tags.join(' ')}</span></h3><p>${s.setting.substring(0,80)}...</p>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
      selectedScenario = s.id;
      document.getElementById('startCampaignBtn').disabled = false;
    });
    list.appendChild(card);
  });
}

function startCampaign() {
  if (!selectedScenario) return;
  SocketClient.emit('trpg_create', { scenarioId: selectedScenario });
  document.getElementById('startCampaignBtn').disabled = true;
  document.getElementById('startCampaignBtn').textContent = '创建中…';
}

function showOwnerStartBtn() {
  if (isOwner) document.getElementById('startBtn').style.display = 'block';
}

function startPlay() {
  SocketClient.emit('trpg_start');
  document.getElementById('startBtn').style.display = 'none';
}

// ── 发送行动 ─────────────────────────────────────────────
function sendAction() {
  const input = document.getElementById('actionInput');
  const action = input.value.trim();
  if (!action) return;
  if (!campaign || campaign.status !== 'playing') {
    Toast.show('战役还未开始', 'error'); return;
  }
  SocketClient.emit('trpg_action', { action });
  input.value = '';
  input.placeholder = '描述你的行动…';
}

document.getElementById('actionInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAction(); }
});

function insertAction(text) {
  document.getElementById('actionInput').value = text;
  document.getElementById('actionInput').focus();
}

// ── 骰子 ─────────────────────────────────────────────────
function rollDice(notation) {
  SocketClient.emit('trpg_roll', { notation });
}

function showSkillCheck() {
  const skill = prompt('技能名称（如：感知、运动、欺骗）');
  if (!skill) return;
  const dcStr = prompt('难度等级 DC（不知道请输入 0）');
  const dc = parseInt(dcStr) || 0;
  SocketClient.emit('trpg_skill_check', { skill: skill.trim(), dc });
}

// ── HP 修改 ───────────────────────────────────────────────
function changeHP(type) {
  const amount = parseInt(document.getElementById('hpAmount').value) || 1;
  SocketClient.emit('trpg_hp_change', { type, amount });
}

// ── 存档 / 导出 ───────────────────────────────────────────
function saveGame() { SocketClient.emit('trpg_save'); }
function exportGame() { SocketClient.emit('trpg_export'); }

// ── 更新场景（DM） ───────────────────────────────────────
function updateScene() {
  const scene = document.getElementById('sceneInput').value.trim();
  if (scene) SocketClient.emit('trpg_update_scene', { scene });
}

// ── 生成 NPC ─────────────────────────────────────────────
function generateNPC() {
  const hint = document.getElementById('npcHint').value.trim() || '一个神秘的路人';
  document.getElementById('npcResult').textContent = '生成中…';
  SocketClient.emit('trpg_gen_npc', { hint });
}

// ── 离开 ─────────────────────────────────────────────────
function leaveGame() {
  if (confirm('确定要离开战役吗？进度已自动保存。')) {
    const rid = Session.roomId;
    Session.clearRoom();
    if (rid) SocketClient.emit('leave_room', { roomId: rid });
    window.location.href = '/lobby.html';
  }
}

// ── 渲染函数 ─────────────────────────────────────────────
function addDMMsg(content, time) {
  const log = document.getElementById('storyLog');
  const el = document.createElement('div');
  el.className = 'dm-msg';
  el.innerHTML = `<div class="dm-label">🎲 地下城主${time ? ' · ' + fmtTime(time) : ''}</div><div class="dm-content">${escHtml(content)}</div>`;
  log.appendChild(el);
}

function addPlayerAction(name, avatar, action, time, isSelf) {
  const log = document.getElementById('storyLog');
  const el = document.createElement('div');
  el.className = 'player-msg';
  el.innerHTML = `<div class="player-hdr"><span class="player-av">${avatar}</span><span class="player-name">${escHtml(name)}</span><span class="action-tag">行动</span><span style="margin-left:auto;font-size:.7rem;color:#556677">${time ? fmtTime(time) : ''}</span></div><div class="player-action">${escHtml(action)}</div>`;
  log.appendChild(el);
}

function addDiceResult(name, notation, rolls, modifier, total, special, time) {
  const log = document.getElementById('storyLog');
  const el = document.createElement('div');
  el.className = 'dice-msg';
  const rollStr = rolls.join(' + ') + (modifier ? (modifier > 0 ? ` + ${modifier}` : ` - ${Math.abs(modifier)}`) : '');
  el.innerHTML = `<div class="dice-header"><span style="font-size:.85rem">🎲</span><span class="dice-label">${escHtml(name)} 掷 ${notation}</span>${special ? `<span class="dice-special ${special.includes('暴击')?'crit':'fumble'}">${special}</span>` : ''}</div><span class="dice-total">${total}</span> <span class="dice-detail">（${rollStr}）</span>`;
  log.appendChild(el);
}

function addCheckResult(name, skill, roll, total, modifier, dc, success, isCritical, isFumble, time) {
  const log = document.getElementById('storyLog');
  const el = document.createElement('div');
  el.className = 'check-msg' + (success === true ? ' check-success' : success === false ? ' check-fail' : '');
  const modStr = modifier >= 0 ? `+${modifier}` : `${modifier}`;
  el.innerHTML = `<span style="font-size:.8rem">🎯</span> <strong>${escHtml(name)}</strong> ${escHtml(skill)}检定：<span class="dice-total">${total}</span> <span class="dice-detail">（骰${roll} ${modStr}）</span>${dc ? ` DC${dc}` : ''} ${success === true ? '<span style="color:#7cd67c">✓ 成功!</span>' : success === false ? '<span style="color:#ff6b6b">✗ 失败</span>' : ''}${isCritical ? ' <span style="color:var(--gold)">⚡暴击</span>' : ''}${isFumble ? ' <span style="color:#ff6b6b">💀大失败</span>' : ''}`;
  log.appendChild(el);
}

function addSysMsg(text) {
  const log = document.getElementById('storyLog');
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  log.appendChild(el);
}

function scrollToBottom() {
  const log = document.getElementById('storyLog');
  log.scrollTop = log.scrollHeight;
}

function renderCampaignInfo() {
  if (!campaign) return;
  document.getElementById('topTitle').textContent = campaign.title;
  document.getElementById('chapterBadge').textContent = `第${campaign.chapter}章`;
  document.getElementById('campaignInfo').innerHTML = `
    <p><strong>${campaign.title}</strong></p>
    <p><span>场景：</span>${campaign.currentScene.substring(0,80)}${campaign.currentScene.length>80?'…':''}</p>
    ${campaign.sessionNotes ? `<p><span>备注：</span>${campaign.sessionNotes.substring(0,60)}</p>` : ''}`;
  if (isOwner) {
    document.getElementById('sceneEdit').classList.add('visible');
    document.getElementById('sceneInput').value = campaign.currentScene;
  }
  // 战利品
  const lootEl = document.getElementById('lootList');
  lootEl.innerHTML = campaign.loot && campaign.loot.length
    ? campaign.loot.map(i => `<li>${escHtml(i)}</li>`).join('')
    : '<li style="color:#556677">无</li>';
}

function updatePartyList() {
  if (!campaign) return;
  const list = document.getElementById('partyList');
  document.getElementById('partyCount').textContent = campaign.players.length;
  list.innerHTML = '';
  campaign.players.forEach(p => {
    if (!p.character) return;
    const c = p.character;
    const isSelf = p.socketId === mySocketId;
    if (isSelf) return; // 自己单独显示
    const pct = (c.hp.current / c.hp.max) * 100;
    const div = document.createElement('div');
    div.className = 'party-member';
    div.innerHTML = `<div class="pm-hdr"><span class="pm-av">${p.avatar||'🧙'}</span><span class="pm-name">${escHtml(c.name)}</span><span class="pm-class">${c.className}</span></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:#1a1a2e;border-radius:3px;height:6px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${pct<25?'#e74c3c':pct<50?'#f39c12':'#2ecc71'};transition:.3s"></div></div><span class="pm-hp">${c.hp.current}/${c.hp.max}</span></div>`;
    list.appendChild(div);
  });
  updateMyChar();
}

function updateMyChar() {
  // 同步最新角色数据
  if (campaign) {
    const me = campaign.players.find(p => p.socketId === mySocketId);
    if (me && me.character) myChar = me.character;
  }
  if (!myChar) return;
  const c = myChar;
  const pct = (c.hp.current / c.hp.max) * 100;
  const fillClass = pct < 25 ? 'danger' : pct < 50 ? 'warn' : '';
  const statKeys = ['STR','DEX','CON','INT','WIS','CHA'];
  const statNames = {STR:'力',DEX:'敏',CON:'体',INT:'智',WIS:'感',CHA:'魅'};
  document.getElementById('myCharCard').innerHTML = `
    <div class="char-name">${escHtml(c.name)}</div>
    <div class="char-sub">${c.race} ${c.className} · Lv.${c.level} · ${c.alignment}</div>
    <div class="hp-bar-wrap">
      <div class="hp-label"><span>生命值</span><span>${c.hp.current} / ${c.hp.max} | AC ${c.ac}</span></div>
      <div class="hp-bar"><div class="hp-fill ${fillClass}" style="width:${pct}%"></div></div>
    </div>
    <div class="char-stats-mini">${statKeys.map(k => {const m=Math.floor((c.stats[k]-10)/2);return `<div class="mini-stat"><div class="n">${statNames[k]}</div><div class="v">${c.stats[k]}</div><div style="font-size:.6rem;color:#aaa">${m>=0?'+'+m:m}</div></div>`;}).join('')}</div>
    <div style="font-size:.75rem;color:#8899bb;margin-top:6px">XP: ${c.xp}/${c.xpToNext} | 熟练 +${c.proficiencyBonus}</div>
    ${c.inventory && c.inventory.length ? `<div style="font-size:.75rem;color:#8899bb;margin-top:3px">🎒 ${c.inventory.join('、')}</div>` : ''}`;
}

// ── 工具 ─────────────────────────────────────────────────
function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtTime(ts) { const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
</script>
</body>
</html>
